name: Build Miniaudio Native Library

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds
          - os: windows-latest
            rid: win-x64
            platform: Windows
            arch: x64
            lib_extension: ".dll"
            msystem: MINGW64
            mingw_package_prefix: mingw-w64-x86_64

          - os: windows-latest
            rid: win-x86
            platform: Windows
            arch: x86
            lib_extension: ".dll"
            msystem: MINGW32
            mingw_package_prefix: mingw-w64-i686

          - os: windows-11-arm
            rid: win-arm64
            platform: Windows
            arch: arm64
            lib_extension: ".dll"
            msystem: CLANGARM64
            mingw_package_prefix: mingw-w64-clang-aarch64

          # Linux builds
          - os: ubuntu-22.04
            rid: linux-x64
            platform: Linux
            arch: x86_64
            cmake_target_arch: x64
            lib_extension: ".so"

          - os: ubuntu-22.04
            rid: linux-arm
            platform: Linux
            arch: armv7l
            cmake_target_arch: arm
            lib_extension: ".so"

          - os: ubuntu-22.04
            rid: linux-arm64
            platform: Linux
            arch: aarch64
            cmake_target_arch: aarch64
            lib_extension: ".so"

          # macOS builds
          - os: macos-latest
            rid: osx-arm64
            platform: macOS
            arch: arm64
            cmake_target_arch: arm64
            lib_extension: ".dylib"

          - os: macos-15-intel
            rid: osx-x64
            platform: macOS
            arch: x86_64
            cmake_target_arch: x86_64
            lib_extension: ".dylib"

          # iOS builds
          - os: macos-latest
            rid: ios-arm64
            platform: iOS
            arch: arm64
            cmake_target_arch: arm64
            lib_extension: ".framework"

          # Android builds
          - os: ubuntu-22.04
            rid: android-arm
            platform: Android
            arch: armeabi-v7a
            cmake_target_arch: armeabi-v7a
            lib_extension: ".so"

          - os: ubuntu-22.04
            rid: android-arm64
            platform: Android
            arch: arm64-v8a
            cmake_target_arch: arm64-v8a
            lib_extension: ".so"

          - os: ubuntu-22.04
            rid: android-x64
            platform: Android
            arch: x86_64
            cmake_target_arch: x86_64
            lib_extension: ".so"

    name: Build for ${{ matrix.platform }} - ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Create Build Directories
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/Native/miniaudio-backend/build
          mkdir -p ${{ github.workspace }}/Native/miniaudio-backend/cmake

      # Windows toolchain setup (MinGW/Clang via MSYS2)
      - name: Setup MSYS2 (Windows)
        if: matrix.platform == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.mingw_package_prefix }}-toolchain
            ${{ matrix.mingw_package_prefix }}-cmake
            ${{ matrix.mingw_package_prefix }}-ninja
            ${{ matrix.mingw_package_prefix }}-pkgconf
            base-devel

      # Linux/Android dependencies
      - name: Install Dependencies (Linux)
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ file binutils

      - name: Install Dependencies (Android)
        if: matrix.platform == 'Android'
        uses: android-actions/setup-android@v2

      - name: Install Cross-Compilation tools (Linux)
        if: matrix.platform == 'Linux' && (matrix.arch == 'armv7l' || matrix.arch == 'aarch64')
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          if [ "${{ matrix.arch }}" == "armv7l" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf binutils-arm-linux-gnueabihf
          elif [ "${{ matrix.arch }}" == "aarch64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Configure CMake (Windows)
        if: matrix.platform == 'Windows'
        shell: msys2 {0}
        working-directory: ${{ github.workspace }}/Native/miniaudio-backend
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Unix)
        if: matrix.platform != 'Windows'
        shell: bash
        working-directory: ${{ github.workspace }}/Native/miniaudio-backend
        run: |
          CMAKE_FLAGS=""
          if [ "${{ matrix.platform }}" == "Android" ]; then
            CMAKE_FLAGS="-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake -DANDROID_ABI=${{ matrix.arch }} -DANDROID_PLATFORM=android-21 -DCMAKE_ANDROID_ARCH_ABI=${{ matrix.cmake_target_arch }}"
          elif [ "${{ matrix.platform }}" == "iOS" ]; then
            CMAKE_FLAGS="-G Xcode \
              -DCMAKE_SYSTEM_NAME=iOS \
              -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_target_arch }} \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
              -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
              -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
              -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO"
          elif [ "${{ matrix.platform }}" == "macOS" ]; then
            CMAKE_FLAGS="-DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_target_arch }}"
          elif [ "${{ matrix.platform }}" == "Linux" ]; then
            # Add specific flags for Linux cross-compilation
            if [ "${{ matrix.arch }}" == "armv7l" ]; then
              CMAKE_FLAGS="-DCMAKE_SYSTEM_PROCESSOR=arm -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++"
            elif [ "${{ matrix.arch }}" == "aarch64" ]; then
              CMAKE_FLAGS="-DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++"
            else
              CMAKE_FLAGS="-DCMAKE_SYSTEM_PROCESSOR=x86_64"
            fi
          fi
          cmake -B build -DCMAKE_BUILD_TYPE=Release $CMAKE_FLAGS

      # Build steps
      - name: Build (Windows)
        if: matrix.platform == 'Windows'
        shell: msys2 {0}
        working-directory: ${{ github.workspace }}/Native/miniaudio-backend/build
        run: |
          cmake --build . --parallel

      - name: Build (iOS)
        if: matrix.platform == 'iOS'
        shell: bash
        working-directory: ${{ github.workspace }}/Native/miniaudio-backend/build
        run: |
          xcodebuild \
            -project *.xcodeproj \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build (Unix)
        if: matrix.platform != 'Windows' && matrix.platform != 'iOS'
        shell: bash
        working-directory: ${{ github.workspace }}/Native/miniaudio-backend/build
        run: |
          cmake --build . --config Release

      # Artifact collection
      - name: Create Output Directory
        shell: bash
        run: |
          mkdir -p runtimes/${{ matrix.rid }}/native

      - name: Copy Library
        shell: bash
        run: |
          mkdir -p runtimes/${{ matrix.rid }}/native
          if [ "${{ matrix.platform }}" == "Windows" ]; then
            cp "${{ github.workspace }}/Native/miniaudio-backend/build/miniaudio.dll" "runtimes/${{ matrix.rid }}/native/"
          elif [ "${{ matrix.platform }}" == "iOS" ]; then
            cp -r "${{ github.workspace }}/Native/miniaudio-backend/build/Release-iphoneos/miniaudio.framework" "runtimes/${{ matrix.rid }}/native/"
          else
            cp "${{ github.workspace }}/Native/miniaudio-backend/build/libminiaudio${{ matrix.lib_extension }}" "runtimes/${{ matrix.rid }}/native/"
          fi

      # Dependency analysis
      - name: Analyze Dependencies and Exports (Windows)
        if: matrix.platform == 'Windows'
        shell: msys2 {0}
        run: |
          LIB_PATH="runtimes/${{ matrix.rid }}/native/miniaudio.dll"
          echo "--- Dependencies for $LIB_PATH ---"
          objdump -p "$LIB_PATH" | grep "DLL Name:" || true
          echo "--- Exports for $LIB_PATH ---"
          nm -g "$LIB_PATH" | grep " T " || true

          echo "--- Validating no MSVC redistributable dependency ---"
          FORBIDDEN_MSVCRT_REGEX='(vcruntime[0-9_]*\.dll|msvcp[0-9_]*\.dll|msvcr[0-9]+d?\.dll)'
          if objdump -p "$LIB_PATH" | grep -Eiq "$FORBIDDEN_MSVCRT_REGEX"; then
            echo "Found forbidden MSVC runtime dependency in $LIB_PATH"
            objdump -p "$LIB_PATH" | grep -Ei "DLL Name:|vcruntime|msvcp|msvcr[0-9]+d?" || true
            exit 1
          fi

      - name: Analyze Dependencies and Exports (iOS)
        if: matrix.platform == 'iOS'
        shell: bash
        run: |
          LIB_PATH="runtimes/${{ matrix.rid }}/native/miniaudio.framework/miniaudio"
          echo "--- Dependencies for iOS ---"
          otool -L "$LIB_PATH"
          echo "--- Symbols ---"
          nm -g "$LIB_PATH" | grep " T "

      - name: Analyze Dependencies and Exports (Android)
        if: matrix.platform == 'Android'
        shell: bash
        run: |
          LIB_PATH="runtimes/${{ matrix.rid }}/native/libminiaudio.so"
          echo "--- Dependencies for Android ---"
          readelf -d "$LIB_PATH"
          echo "--- Symbols ---"
          nm -g "$LIB_PATH" | grep " T "

      - name: Analyze Dependencies and Exports (Linux)
        if: matrix.platform == 'Linux'
        shell: bash
        run: |
          LIB_PATH="runtimes/${{ matrix.rid }}/native/libminiaudio.so"
          echo "=== Library Information ==="
          file "$LIB_PATH"

          echo -e "\n=== Dependencies ==="
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            ldd "$LIB_PATH" || true
          else
            readelf -d "$LIB_PATH" | grep "NEEDED" || true
          fi

          echo -e "\n=== Symbols ==="
          if [[ "${{ matrix.arch }}" == "x86_64" || "${{ matrix.arch }}" == "aarch64" ]]; then
            nm -g "$LIB_PATH" | grep " T " || true
          else
            arm-linux-gnueabihf-nm -g "$LIB_PATH" | grep " T " || true
          fi

          echo -e "\n=== SONAME ==="
          readelf -d "$LIB_PATH" | grep "SONAME" || true

      - name: Analyze Dependencies and Exports (macOS)
        if: matrix.platform == 'macOS'
        shell: bash
        run: |
          LIB_PATH="runtimes/${{ matrix.rid }}/native/libminiaudio.dylib"
          echo "--- Dependencies for macOS ---"
          otool -L "$LIB_PATH"
          echo "--- Symbols ---"
          nm -g "$LIB_PATH" | grep " T "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}

  package:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create final package
        run: |
          mkdir -p runtimes
          cp -r artifacts/* runtimes/
          zip -r miniaudio-native-libraries.zip runtimes

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: miniaudio-native-libraries
          path: miniaudio-native-libraries.zip
